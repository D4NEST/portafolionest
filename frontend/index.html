<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGES — Acceso</title>
  <style>
    :root {
      --primary:#0066ff; --accent:#00d4ff; --bg:#0a0a0a;
      --card:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.1);
      --text:#fff; --text2:#b0b0b0; --danger:#ff4444;
      --grad:linear-gradient(135deg,#0066ff,#00d4ff);
      --radius:12px; --radius-lg:16px;
      --shadow:0 15px 50px rgba(0,102,255,0.25);
      --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI','Inter',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;}
    body::before{content:'';position:fixed;inset:0;z-index:-1;
      background:radial-gradient(circle at 20% 80%,rgba(0,102,255,.1) 0%,transparent 50%),
        radial-gradient(circle at 80% 20%,rgba(0,212,255,.08) 0%,transparent 50%);}
    .login-wrap{width:100%;max-width:420px;padding:20px;}
    .logo-area{text-align:center;margin-bottom:28px;}
    .logo-area img{width:72px;height:72px;object-fit:contain;border-radius:50%;display:none;}
    .logo-area .default-icon{font-size:3rem;}
    .company-name{font-size:1.8rem;font-weight:700;background:var(--grad);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:8px;}
    .card{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);
      border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:36px;position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);}
    h2{text-align:center;color:var(--text2);font-size:1rem;font-weight:400;margin-bottom:28px;}
    .form-group{margin-bottom:20px;}
    label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:6px;
      text-transform:uppercase;letter-spacing:.5px;}
    input{width:100%;padding:13px 16px;background:rgba(255,255,255,.03);
      border:1px solid var(--border);border-radius:var(--radius);color:var(--text);
      font-size:.95rem;outline:none;transition:var(--transition);}
    input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,102,255,.1);}
    .btn{width:100%;padding:14px;background:var(--grad);border:none;
      border-radius:var(--radius);color:#fff;font-size:.95rem;font-weight:600;
      cursor:pointer;transition:var(--transition);text-transform:uppercase;letter-spacing:.5px;
      margin-top:8px;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,102,255,.3);}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .error{color:var(--danger);font-size:.85rem;margin-top:12px;display:none;text-align:center;}
    .setup-link{text-align:center;margin-top:20px;font-size:.85rem;color:var(--text2);}
    .setup-link a{color:var(--accent);text-decoration:none;}
    .setup-link a:hover{text-decoration:underline;}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <img id="logoImg" alt="Logo empresa" />
    <div class="default-icon" id="defaultIcon">🧬</div>
    <div class="company-name" id="companyName">SIGES</div>
  </div>
  <div class="card">
    <h2>Ingresa tus credenciales</h2>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="admin@empresa.com" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn" id="btnLogin" onclick="login()">Ingresar →</button>
    <p class="error" id="errorMsg"></p>
  </div>
  <div class="setup-link" id="setupLink" style="display:none">
    ¿Primera vez? <a href="/setup">Configura el sistema aquí</a>
  </div>
</div>

<script>
  const API = '/api';

  async function init() {
    try {
      const res = await fetch(`${API}/config`);
      const config = await res.json();
      if (!config.configurado) {
        window.location.href = '/setup'; return;
      }
      if (config.nombre) document.getElementById('companyName').textContent = config.nombre;
      if (config.logo_path) {
        const img = document.getElementById('logoImg');
        img.src = config.logo_path;
        img.style.display = 'block';
        document.getElementById('defaultIcon').style.display = 'none';
      }
    } catch {
      document.getElementById('setupLink').style.display = 'block';
    }
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');
    const errEl = document.getElementById('errorMsg');

    if (!email || !password) { errEl.textContent = 'Completa todos los campos.'; errEl.style.display = 'block'; return; }

    btn.disabled = true; btn.textContent = '⏳ Ingresando...'; errEl.style.display = 'none';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al ingresar');
      window.location.href = '/dashboard';
    } catch(err) {
      errEl.textContent = err.message; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar →';
    }
  }

  init();
</script>
</body>
</html>
